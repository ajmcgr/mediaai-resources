<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media AI — Search Journalists and Creators Using AI</title>
    <meta name="description" content="AI-powered media database. Find the right journalists and creators for your stories, campaigns, and projects in seconds — with verified emails and socials." />
    <meta name="author" content="Media AI" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="theme-color" content="#ffffff">

    <!-- Preload Reckless display font to avoid FOUT (text rendering in Inter then swapping) -->
    <link rel="preload" href="/fonts/Reckless-Medium.woff" as="font" type="font/woff" crossorigin>
    <link rel="preload" href="/fonts/Reckless-SemiBold.otf" as="font" type="font/otf" crossorigin>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Open Graph (sitewide fallback; per-route Helmet overrides title/description/url/canonical) -->
    <meta property="og:title" content="Media AI — Search Journalists and Creators Using AI" />
    <meta property="og:description" content="AI-powered media database. Find the right journalists and creators for your stories, campaigns, and projects in seconds — with verified emails and socials." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trymedia.ai/" />
    <meta property="og:site_name" content="Media AI" />
    <meta property="og:image" content="https://trymedia.ai/og-image.png?v=5" />
    <meta property="og:image:alt" content="Media AI — Search journalists and creators using AI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Media AI — Search Journalists and Creators Using AI" />
    <meta name="twitter:description" content="AI-powered media database. Find the right journalists and creators for your stories, campaigns, and projects in seconds." />
    <meta name="twitter:image" content="https://trymedia.ai/og-image.png?v=5" />
    <meta name="twitter:image:alt" content="Media AI — Search journalists and creators using AI" />

    <!-- DNS prefetch / preconnect for deferred third-parties -->
    <link rel="dns-prefetch" href="https://client.crisp.chat">
    <link rel="dns-prefetch" href="https://widget.senja.io">
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">

    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Media AI",
          "url": "https://trymedia.ai/",
          "logo": "https://trymedia.ai/lovable-uploads/db4c262d-1134-420a-aa62-f166622f7c49.png"
        },
        {
          "@type": "WebSite",
          "name": "Media AI",
          "url": "https://trymedia.ai/",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://trymedia.ai/resources?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- Google Analytics (kept lightweight + async, non-blocking) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CM21J1PSY3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CM21J1PSY3');
    </script>

    <!--
      Crisp Chat + Senja Testimonials are now loaded by src/lib/deferredScripts.ts
      on idle / first user interaction to reduce initial JS payload and TBT.
    -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
